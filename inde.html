<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qiroatul Kutub — Menu Utama</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #333;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      padding-bottom: 30px;
    }

    .app-header {
      background-color: #1E3A8A;
      width: 100%;
      padding: 25px 15px;
      box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
      margin-bottom: 30px;
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
    }

    /* Tempat Logo */
    .logo-container { display: flex; justify-content: center; margin-bottom: 15px; }
    .logo-placeholder {
      width: 80px; height: 80px;
      background-color: #2563EB; color: white;
      border-radius: 50%; border: 3px solid #BFDBFE;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    h1 { text-align:center; font-size:1.4rem; color:#ffffff; margin-bottom:0.5rem; font-weight:700; letter-spacing:0.5px; margin-top:0; }
    h2 { text-align:center; font-size:1rem; color:#BFDBFE; margin-top:0; margin-bottom:0; font-weight:500; }

    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 90%;
      max-width: 400px;
    }

    .btn-jilid {
      display: block;
      background-color: #2563EB;
      color: white;
      text-decoration: none;
      text-align: center;
      padding: 18px;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(37, 99, 235, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
    }

    .btn-jilid:hover {
      background-color: #1D4ED8;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(37, 99, 235, 0.25);
    }

    .btn-jilid:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo-container">
      <div class="logo-placeholder">LOGO</div>
    </div>
    <h1>QIROATUL KUTUB METODE AL MUSTADJABI</h1>
    <h2>Silakan Pilih Jilid Pembelajaran</h2>
  </header>

  <div class="menu-container">
    <!-- Link ini akan mengarah ke file jilid1.html yang baru saja Anda namai -->
    <a href="jilid1.html" class="btn-jilid">📚 Buka Jilid 1</a>
    
    <!-- Nanti Anda tinggal membuat file jilid2.html, jilid3.html, dst. -->
    <a href="jilid2.html" class="btn-jilid">📚 Buka Jilid 2</a>
    <a href="jilid3.html" class="btn-jilid">📚 Buka Jilid 3</a>
    <a href="jilid4.html" class="btn-jilid">📚 Buka Jilid 4</a>
    <a href="jilid5.html" class="btn-jilid">📚 Buka Jilid 5</a>
    <a href="jilid6.html" class="btn-jilid">📚 Buka Jilid 6</a>
  </div>

</body>
</html>
