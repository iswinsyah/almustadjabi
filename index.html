<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Datang — Qiroatul Kutub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      background-color: #EFF6FF; /* Biru sangat muda agar kartu putih terlihat pop-out */
      color: #333; font-family: 'Poppins', sans-serif; overflow-x: hidden;
    }
    body { display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
    
    .app-header {
      background-color: #1E3A8A; width: 100%; padding: 40px 15px 60px 15px; box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
      border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
    }
    .logo-container { display: flex; justify-content: center; margin-bottom: 15px; }
    .logo-img {
      width: 95px; height: 95px; border-radius: 50%; object-fit: contain;
      background-color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 3px solid #BFDBFE;
    }
    h1 { text-align:center; font-size:1.5rem; color:#ffffff; margin-bottom:0.5rem; font-weight:700; letter-spacing:0.5px; margin-top:0; }
    h2 { text-align:center; font-size:1rem; color:#BFDBFE; margin-top:0; margin-bottom:0; font-weight:500; }
    
    /* Kotak Autentikasi / Auth Card */
    .auth-card {
      background: white; width: 90%; max-width: 450px; border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
      margin-top: -35px; /* Menimpa sedikit bagian atas (header) */
      position: relative; z-index: 10;
    }
    .auth-tabs { display: flex; background: #F3F4F6; }
    .auth-tab {
      flex: 1; padding: 15px; text-align: center; font-weight: 600;
      color: #6B7280; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent;
    }
    .auth-tab.active { background: white; color: #1E3A8A; border-bottom: 3px solid #2563EB; }
    
    .auth-body { padding: 30px 25px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; color: #4B5563; margin-bottom: 5px; font-weight: 600; }
    .form-control {
      width: 100%; padding: 12px 15px; border: 1px solid #D1D5DB; border-radius: 8px;
      font-family: 'Poppins', sans-serif; font-size: 0.95rem; box-sizing: border-box; transition: 0.2s;
    }
    .form-control:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    
    .btn-submit {
      width: 100%; background-color: #2563EB; color: white; border: none; padding: 14px;
      border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
      transition: background-color 0.2s, transform 0.1s; font-family: 'Poppins', sans-serif;
      margin-top: 15px; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
    }
    .btn-submit:hover { background-color: #1D4ED8; }
    .btn-submit:active { transform: scale(0.98); }
    
    /* Animasi pergantian form */
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo-container">
      <img src="assets/images/logo.png" alt="Logo Qiroatul Kutub" class="logo-img">
    </div>
    <h1>QIROATUL KUTUB</h1>
    <h2>Metode Al Mustadjabi</h2>
  </header>

  <div class="auth-card">
    <!-- Navigasi Tab -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login">Masuk</div>
      <div class="auth-tab" id="tab-signup">Daftar Baru</div>
    </div>
    
    <div class="auth-body">
      <!-- TAB FORM LOGIN -->
      <form id="form-login" class="auth-form active">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" class="form-control" placeholder="Masukkan username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn-submit">Masuk ke Pelajaran</button>
      </form>

      <!-- TAB FORM PENDAFTARAN -->
      <form id="form-signup" class="auth-form">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="reg-nama" class="form-control" placeholder="Nama sesuai identitas" required>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="reg-gender" class="form-control" required>
            <option value="" disabled selected>-- Pilih Gender --</option>
            <option value="L">Laki-laki</option>
            <option value="P">Perempuan</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal Lahir</label>
          <input type="date" id="reg-tgl" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="contoh@email.com" required>
        </div>
        <div class="form-group">
          <label>Nomor WhatsApp</label>
          <input type="tel" id="reg-wa" class="form-control" placeholder="Contoh: 0812xxxxxx" required>
        </div>
        <div class="form-group">
          <label>Domisili (Kota/Kab)</label>
          <input type="text" id="reg-domisili" class="form-control" placeholder="Contoh: Jakarta Selatan" required>
        </div>
        <hr style="border: 0; border-top: 1px solid #E5E7EB; margin: 25px 0;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" class="form-control" placeholder="Pilih username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Buat password" required>
        </div>
        <button type="submit" class="btn-submit">Buat Akun Sekarang</button>
      </form>
    </div>
  </div>

  <script>
    // Cek apakah perangkat ini sudah pernah login sebelumnya
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.replace('menu.html');
    }

    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const formLogin = document.getElementById('form-login');
    const formSignup = document.getElementById('form-signup');

    // Logika berpindah Tab
    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabSignup.classList.remove('active');
      formLogin.classList.add('active');
      formSignup.classList.remove('active');
    });

    tabSignup.addEventListener('click', () => {
      tabSignup.classList.add('active');
      tabLogin.classList.remove('active');
      formSignup.classList.add('active');
      formLogin.classList.remove('active');
    });

    // Logika ketika Tombol "Masuk ke Pelajaran" ditekan
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault(); // Mencegah loading halaman
      
      const btn = formLogin.querySelector('.btn-submit');
      const originalText = btn.textContent;
      btn.textContent = "Memeriksa...";
      btn.disabled = true;

      const data = {
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value
      };

      try {
        const response = await fetch('login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if (result.status === 'success') {
          // Simpan sesi dan identitas ke Local Storage
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('username', data.username);
          localStorage.setItem('status_akun', result.status_akun || 'free'); // Simpan status premium
          
          window.location.href = 'menu.html';
        } else {
          alert('Login Gagal: ' + result.message);
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi. Pastikan script berjalan di server.');
      }
      
      btn.textContent = originalText;
      btn.disabled = false;
    });

    // Logika ketika Tombol "Buat Akun Sekarang" ditekan
    formSignup.addEventListener('submit', async (e) => {
      e.preventDefault(); // Mencegah loading halaman

      const btn = formSignup.querySelector('.btn-submit');
      const originalText = btn.textContent;
      btn.textContent = "Menyimpan Data...";
      btn.disabled = true;

      const data = {
        nama: document.getElementById('reg-nama').value,
        gender: document.getElementById('reg-gender').value,
        tanggal_lahir: document.getElementById('reg-tgl').value,
        email: document.getElementById('reg-email').value,
        whatsapp: document.getElementById('reg-wa').value,
        domisili: document.getElementById('reg-domisili').value,
        username: document.getElementById('reg-username').value,
        password: document.getElementById('reg-password').value
      };

      try {
        const response = await fetch('register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if(result.status === 'success') {
          alert('Alhamdulillah! Akun berhasil dibuat.\nSilakan masuk menggunakan Username dan Password Anda.');
          // Opsional: Jika ingin otomatis login setelah daftar, aktifkan dua baris ini
          // localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('username', data.username); window.location.href = 'menu.html';
          formSignup.reset();
          tabLogin.click();
        } else {
          alert('Gagal mendaftar: ' + result.message);
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi server.');
      }
      
      btn.textContent = originalText;
      btn.disabled = false;
    });

    // --- Tombol Rahasia Menuju Halaman Admin ---
    const logo = document.querySelector('.logo-img');
    let logoClickCount = 0;
    let logoClickTimer;

    logo.addEventListener('click', () => {
      logoClickCount++;
      // Reset counter jika ada jeda lebih dari 2 detik
      clearTimeout(logoClickTimer);
      logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);

      if (logoClickCount >= 7) {
        window.location.href = 'admin/'; // Arahkan ke folder admin
      }
    });
  </script>
</body>
</html>
