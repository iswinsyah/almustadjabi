<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qiroatul Kutub — Tabel Kosakata (Template)</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 10px;
      padding-bottom: 60px; /* Tambahkan padding bawah untuk footer yang fixed */
    }

    h1 { text-align:center; font-size:1.5rem; color:#4FB7B3; margin-bottom:0.5rem; }
    h2 { text-align:center; font-size:1.4rem; margin-top:0; margin-bottom:0.3rem; }
    h3 { text-align:center; font-size:1.2rem; margin-bottom:1rem; }

    .kotak-besar { 
      background-color:#A8FBD3; 
      border-radius:10px; 
      padding:40px; 
      text-align:center; 
      font-size:1.2rem; 
      font-weight:bold; 
      margin-bottom:20px; 
      width:100%; 
      max-width:800px; 
    }

    .grid-kotak { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); /* Pastikan selalu 5 kolom */
      gap: 10px; 
      margin-bottom: 20px; 
      width: 100%;
      max-width: 900px;
    }

    .grid-item { 
      background-color:#26667F; 
      color:white; 
      border-radius:10px; 
      padding:15px; 
      text-align:center; 
      font-weight:bold; /* Dipertebal seperti tulisan kitab */
      min-height:60px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      font-size:2rem; /* Font Arab diperbesar */
      position:relative;
      cursor:pointer;
    }

    /* Sesuaikan font dan padding di HP agar 5 kolom tetap proporsional */
    @media (max-width: 768px) {
      .grid-item {
        font-size: 1.3rem;
        padding: 10px 5px;
        min-height: 50px;
      }
    }

    .popup {
      display:none;
      position:absolute;
      bottom:110%;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
      color:#333;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,0.15);
      padding:8px 12px;
      font-size:1rem;
      white-space:normal;
      z-index:10;
      width:max-content;
      max-width:250px;
    }

    .grid-item:hover .popup, .grid-item:active .popup { display:block; }

    /* Tombol AI Cek Suara di Fase 3 */
    .btn-ai {
      display: block;
      margin-top: 8px;
      padding: 6px 10px;
      background-color: #4FB7B3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 0.9rem;
    }
    .btn-ai:hover { background-color: #3a8a86; }

    .halaman { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:100px; }
    .halaman input { padding:8px; border-radius:5px; border:1px solid #ccc; width:150px; }

    footer { position:fixed; bottom:0; left:0; width:100%; background-color:#26667F; display:flex; justify-content:center; gap:15px; padding:10px 0; z-index:9999; }
    footer button { background-color:white; border:none; border-radius:5px; padding:8px 12px; font-size:14px; cursor:pointer; transition: background-color 0.2s; }
    footer button:hover { background-color:#e0e0e0; }

  </style>
</head>
<body>
  <h1>QIROATUL KUTUB METODE AL MUSTADJABI</h1>
  <h2>Cara Mudah Bisa Baca Kitab Secara Alami Tanpa Ribet</h2>
  <h3 id="judul-h3">Judul Halaman Placeholder</h3>

  <div class="kotak-besar" id="kotak-besar">Kotak Besar Kosong</div>
  
  <!-- Grid Kosong yang akan diisi oleh JavaScript -->
  <div class="grid-kotak" id="grid-kotak"></div>

  <div class="halaman">
    <span id="halaman-teks">Halaman —</span>
    <input type="text" id="search" placeholder="Cari halaman...">
  </div>

  <footer>
    <button id="btnMundur">⬅ Mundur</button>
    <button id="btnRefresh">🔄 Refresh</button>
    <button id="btnMaju">➡ Maju</button>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    // URL Web App dari Google Apps Script Anda akan diletakkan di sini
    const gasApiUrl = 'https://script.google.com/macros/s/AKfycbxSUFw79hAluE84LK6kToEyBkDuW0BLSS8gWcofSfagi-cQYH9j2_jeWk7LUFSz4OF8/exec';

    let dataPelajaran = [];
    let indexSaatIni = 0;

    // Fungsi untuk memuat data dari Google Apps Script
    async function muatDataPelajaran() {
      document.getElementById('judul-h3').textContent = 'Memuat Data Pelajaran...';
      try {
        const response = await fetch(gasApiUrl);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const dataBab = await response.json();
        
        // === MAGIC SCRIPT: Mengubah Bab menjadi Halaman (3 Fase) secara Otomatis ===
        prosesDataBab(dataBab);
        renderHalaman();

      } catch (error) {
        console.error('Gagal memuat data pelajaran:', error);
        document.getElementById('judul-h3').textContent = 'Gagal Memuat Data';
        document.getElementById('kotak-besar').textContent = 'Pastikan URL Google Apps Script benar dan sudah di-deploy dengan akses "Anyone". Coba refresh halaman.';
      }
    }

    // === MAGIC SCRIPT: Mengubah 5 Bab menjadi 15 Halaman (3 Fase) secara Otomatis ===
    function prosesDataBab(dataBab) {
      dataPelajaran = []; // Kosongkan dulu untuk refresh
      let nomorHalaman = 1;
      
      // Putaran 1 (Halaman 1-5): Fase 1 - Harokat Lengkap untuk semua Bab
      dataBab.forEach(bab => {
        dataPelajaran.push({
          halaman: nomorHalaman++,
          judul: bab.judul + " (Fase 1: Harokat Lengkap)",
          penjelasan: bab.penjelasan,
          fase: 1,
          kosakata: bab.kosakata
        });
      });

      // Putaran 2 (Halaman 6-10): Fase 2 - Harokat Akhir Saja untuk semua Bab
      dataBab.forEach(bab => {
        dataPelajaran.push({
          halaman: nomorHalaman++,
          judul: bab.judul + " (Fase 2: Harokat Akhir Saja)",
          penjelasan: "Latih insting I'rob Anda. Harokat di tengah kata dihilangkan, sisa harokat akhirnya saja.",
          fase: 2,
          kosakata: bab.kosakata.map(k => ({
            kata: k.kata.replace(/[\u064B-\u065F\u0670]+(?=[^\s\u064B-\u065F\u0670])/g, ''), // Hapus harokat tengah
            arti: k.arti,
            kataAsli: k.kata
          }))
        });
      });

      // Putaran 3 (Halaman 11-15): Fase 3 - Gundul Total + AI untuk semua Bab
      dataBab.forEach(bab => {
        dataPelajaran.push({
          halaman: nomorHalaman++,
          judul: bab.judul + " (Fase 3: Gundul Total + Cek Suara AI)",
          penjelasan: "Tebak bacaan Arab Gundul ini, lalu klik kotak dan tekan tombol 🎤 untuk dikoreksi AI.",
          fase: 3,
          kosakata: bab.kosakata.map(k => ({
            kata: k.kata.replace(/[\u064B-\u065F\u0670]/g, ''), // Hapus SEMUA harokat
            arti: k.arti,
            kataAsli: k.kata
          }))
        });
      });
    }

    // Fungsi untuk mengacak urutan array (Algoritma Fisher-Yates Shuffle)
    function acakUrutan(array) {
      let arr = [...array]; // Copy array agar data asli tidak rusak
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Fungsi AI Voice Recognition (Web Speech API)
    function cekBacaanAI(kataTargetAsli, btnElement) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Browser Anda tidak mendukung AI Suara. Mohon gunakan Google Chrome.");
        return;
      }
      
      const recognition = new SpeechRecognition();
      recognition.lang = 'ar-SA'; // Set bahasa deteksi ke Arab
      recognition.interimResults = false;
      
      btnElement.innerHTML = "🎙️ Mendengarkan...";
      btnElement.style.backgroundColor = "#e74c3c"; // Merah tanda merekam

      recognition.onresult = (event) => {
        const hasil = event.results[0][0].transcript;
        const hasilGundul = hasil.replace(/[\u064B-\u065F\u0670]/g, '').trim();
        const targetGundul = kataTargetAsli.replace(/[\u064B-\u065F\u0670]/g, '').trim();
        
        if (hasilGundul === targetGundul) {
          alert(`✅ LUAR BIASA! Bacaan Anda benar.\n\nBacaan Anda: ${hasil}\nTarget: ${kataTargetAsli}`);
        } else {
          alert(`🤖 AI Feedback: Kurang Tepat.\n\nAnda membaca: ${hasil}\nSeharusnya: ${kataTargetAsli}\n\nPenjelasan: AI mendeteksi perbedaan pola. Coba teliti kembali harokat akhirnya.`);
        }
        btnElement.innerHTML = "🎤 Cek Bacaan";
        btnElement.style.backgroundColor = "#4FB7B3";
      };

      recognition.onerror = (event) => {
        alert("Gagal mendengarkan suara: " + event.error);
        btnElement.innerHTML = "🎤 Cek Bacaan";
        btnElement.style.backgroundColor = "#4FB7B3";
      };

      recognition.start();
    }

    function renderHalaman() {
      if (dataPelajaran.length === 0) return; // Jangan render jika data belum siap

      const data = dataPelajaran[indexSaatIni];
      
      // Update Teks Panduan
      document.getElementById('judul-h3').textContent = data.judul;
      document.getElementById('kotak-besar').textContent = data.penjelasan;
      document.getElementById('halaman-teks').textContent = 'Halaman ' + data.halaman;
      document.getElementById('search').value = data.halaman;

      // Bersihkan dan Update Grid Kosakata
      const grid = document.getElementById('grid-kotak');
      grid.innerHTML = ''; 
      
      // Pastikan ada 30 item untuk mengisi semua kotak, ulangi jika perlu
      const targetJumlahKotak = 30;
      let kosakataUntukGrid = [];
      if (data.kosakata.length > 0) {
        for (let i = 0; i < targetJumlahKotak; i++) {
          kosakataUntukGrid.push(data.kosakata[i % data.kosakata.length]);
        }
      } else {
        // Fallback jika tidak ada kosakata sama sekali, isi dengan placeholder kosong
        for (let i = 0; i < targetJumlahKotak; i++) {
          kosakataUntukGrid.push({ kata: '&nbsp;', arti: '' });
        }
      }

      // Acak urutan kosakata yang sudah diisi penuh agar posisinya dinamis
      const kotakArray = acakUrutan(kosakataUntukGrid);
      
      kotakArray.forEach(item => {
        const div = document.createElement('div');
        div.className = 'grid-item';

        div.textContent = item.kata;
        const popup = document.createElement('div');
        popup.className = 'popup';
        popup.innerHTML = `<div>${item.arti}</div>`;
        
        // Tambahkan tombol Cek AI KHUSUS di Fase 3
        if (data.fase === 3) {
          const btnAI = document.createElement('button');
          btnAI.className = 'btn-ai';
          btnAI.innerHTML = '🎤 Cek Bacaan';
          btnAI.onclick = (e) => {
            e.stopPropagation(); // Mencegah klik menembus ke kotak belakangnya
            cekBacaanAI(item.kataAsli, btnAI);
          };
          popup.appendChild(btnAI);
        }
        
        div.appendChild(popup);
        grid.appendChild(div);
      });
    }

    // Tombol Navigasi
    document.getElementById('btnMaju').onclick = () => {
      if (indexSaatIni < dataPelajaran.length - 1) { indexSaatIni++; renderHalaman(); }
    };
    document.getElementById('btnMundur').onclick = () => {
      if (indexSaatIni > 0) { indexSaatIni--; renderHalaman(); }
    };
    document.getElementById('btnRefresh').onclick = () => muatDataPelajaran();

    // Muat data pelajaran saat halaman pertama kali dibuka
    muatDataPelajaran();
  });
  </script>
</body>
</html>
