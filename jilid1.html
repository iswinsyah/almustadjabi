<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qiroatul Kutub — Tabel Kosakata (Template)</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 10px;
    }

    h1 { text-align:center; font-size:1.5rem; color:#4FB7B3; margin-bottom:0.5rem; }
    h2 { text-align:center; font-size:1.4rem; margin-top:0; margin-bottom:0.3rem; }
    h3 { text-align:center; font-size:1.2rem; margin-bottom:1rem; }

    .kotak-besar { 
      background-color:#A8FBD3; 
      border-radius:10px; 
      padding:40px; 
      text-align:center; 
      font-size:1.2rem; 
      font-weight:bold; 
      margin-bottom:20px; 
      width:100%; 
      max-width:800px; 
    }

    .grid-kotak { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; 
      margin-bottom: 20px; 
      width: 100%;
      max-width: 900px;
    }

    @media (max-width: 768px) {
      .grid-kotak { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 769px) {
      .grid-kotak { grid-template-columns: repeat(5, 1fr); }
    }

    .grid-item { 
      background-color:#26667F; 
      color:white; 
      border-radius:10px; 
      padding:15px; 
      text-align:center; 
      font-weight:500; 
      min-height:60px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      font-size:1.5rem;
      position:relative;
      cursor:pointer;
    }

    .popup {
      display:none;
      position:absolute;
      bottom:110%;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
      color:#333;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,0.15);
      padding:8px 12px;
      font-size:1rem;
      white-space:normal;
      z-index:10;
      width:max-content;
      max-width:250px;
    }

    .grid-item:hover .popup, .grid-item:active .popup { display:block; }

    .halaman { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:100px; }
    .halaman input { padding:8px; border-radius:5px; border:1px solid #ccc; width:150px; }

    footer { position:fixed; bottom:0; left:0; width:100%; background-color:#26667F; display:flex; justify-content:center; gap:15px; padding:10px 0; z-index:9999; }
    footer button { background-color:white; border:none; border-radius:5px; padding:8px 12px; font-size:14px; cursor:pointer; transition: background-color 0.2s; }
    footer button:hover { background-color:#e0e0e0; }

  </style>
</head>
<body>
  <h1>QIROATUL KUTUB METODE AL MUSTADJABI</h1>
  <h2>Cara Mudah Bisa Baca Kitab Secara Alami Tanpa Ribet</h2>
  <h3 id="judul-h3">Judul Halaman Placeholder</h3>

  <div class="kotak-besar" id="kotak-besar">Kotak Besar Kosong</div>
  
  <!-- Grid Kosong yang akan diisi oleh JavaScript -->
  <div class="grid-kotak" id="grid-kotak"></div>

  <div class="halaman">
    <span id="halaman-teks">Halaman —</span>
    <input type="text" id="search" placeholder="Cari halaman...">
  </div>

  <footer>
    <button id="btnMundur">⬅ Mundur</button>
    <button id="btnRefresh">🔄 Refresh</button>
    <button id="btnMaju">➡ Maju</button>
  </footer>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    
    // Database Kurikulum Jilid 1 (Disusun sesuai pola Al Mustadjabi)
    const dataPelajaran = [
      {
        halaman: 1,
        judul: "Pelajaran 1: Kosakata Dasar (Mudzakkar & Muannats)",
        penjelasan: "Kata benda (Isim) dasar umumnya berakhiran Dhommah Tanwin (-un). Muannats biasanya diakhiri Ta' Marbuthoh (ة).",
        kosakata: [
          { kata: "كِتَابٌ", arti: "Buku (Mudzakkar)" },
          { kata: "مَدْرَسَةٌ", arti: "Sekolah (Muannats)" },
          { kata: "بَابٌ", arti: "Pintu (Mudzakkar)" },
          { kata: "سَيَّارَةٌ", arti: "Mobil (Muannats)" },
          { kata: "مَسْجِدٌ", arti: "Masjid (Mudzakkar)" },
          { kata: "نَافِذَةٌ", arti: "Jendela (Muannats)" }
        ]
      },
      {
        halaman: 2,
        judul: "Pelajaran 2: Pengenalan Alif Lam (ال) - Ma'rifat",
        penjelasan: "PENTING: Jika kata benda diawali Alif Lam (ال), maka Tanwin (-un) HILANG menjadi Dhommah biasa (-u).",
        kosakata: [
          { kata: "الْكِتَابُ", arti: "Buku itu (Bukan Kitabun)" },
          { kata: "الْمَدْرَسَةُ", arti: "Sekolah itu (Bukan Madrasatun)" },
          { kata: "الْبَابُ", arti: "Pintu itu" },
          { kata: "السَّيَّارَةُ", arti: "Mobil itu" },
          { kata: "الْمَسْجِدُ", arti: "Masjid itu" },
          { kata: "النَّافِذَةُ", arti: "Jendela itu" }
        ]
      },
      {
        halaman: 3,
        judul: "Pelajaran 3: Pengaruh Huruf Jar (فِي, عَلَى, مِنْ)",
        penjelasan: "Perhatikan akhiran kata! Huruf Jar (Kata Depan) membuat harokat akhir kata benda setelahnya berubah menjadi Kasrah (-i / -in).",
        kosakata: [
          { kata: "فِي الْمَسْجِدِ", arti: "Di dalam masjid (-i)" },
          { kata: "عَلَى الْمَكْتَبِ", arti: "Di atas meja (-i)" },
          { kata: "مِنَ الْمَدْرَسَةِ", arti: "Dari sekolah (-i)" },
          { kata: "إِلَى الْبَيْتِ", arti: "Ke rumah (-i)" }
        ]
      },
      {
        halaman: 4,
        judul: "Pelajaran 4: Tunggal, Ganda (Mutsanna), & Jamak",
        penjelasan: "Perubahan bentuk kata benda berdasarkan jumlahnya. Perhatikan penambahan huruf di akhirnya.",
        kosakata: [
          { kata: "مُسْلِمٌ", arti: "1 Muslim (Tunggal)" },
          { kata: "مُسْلِمَانِ", arti: "2 Muslim (Akhiran -aani)" },
          { kata: "مُسْلِمُوْنَ", arti: "Banyak Muslim (Akhiran -uuna)" },
          { kata: "مُسْلِمَةٌ", arti: "1 Muslimah (Tunggal)" },
          { kata: "مُسْلِمَتَانِ", arti: "2 Muslimah (Akhiran -taani)" },
          { kata: "مُسْلِمَاتٌ", arti: "Banyak Muslimah (Akhiran -aatun)" }
        ]
      }
    ];

    let indexSaatIni = 0;

    // Fungsi untuk mengacak urutan array (Algoritma Fisher-Yates Shuffle)
    function acakUrutan(array) {
      let arr = [...array]; // Copy array agar data asli tidak rusak
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderHalaman() {
      const data = dataPelajaran[indexSaatIni];
      
      // Update Teks Panduan
      document.getElementById('judul-h3').textContent = data.judul;
      document.getElementById('kotak-besar').textContent = data.penjelasan;
      document.getElementById('halaman-teks').textContent = 'Halaman ' + data.halaman;
      document.getElementById('search').value = data.halaman;

      // Bersihkan dan Update Grid Kosakata
      const grid = document.getElementById('grid-kotak');
      grid.innerHTML = ''; 
      
      // Acak urutan kosakata sebelum ditampilkan
      const kosakataDinamis = acakUrutan(data.kosakata);
      
      kosakataDinamis.forEach(item => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.textContent = item.kata;

        const popup = document.createElement('div');
        popup.className = 'popup';
        popup.textContent = item.arti;

        div.appendChild(popup);
        grid.appendChild(div);
      });
    }

    // Tombol Navigasi
    document.getElementById('btnMaju').onclick = () => {
      if (indexSaatIni < dataPelajaran.length - 1) { indexSaatIni++; renderHalaman(); }
    };
    document.getElementById('btnMundur').onclick = () => {
      if (indexSaatIni > 0) { indexSaatIni--; renderHalaman(); }
    };
    document.getElementById('btnRefresh').onclick = () => renderHalaman();

    // Muat halaman pertama kali
    renderHalaman();
  });
  </script>
</body>
</html>
