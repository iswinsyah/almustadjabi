# Nama workflow yang akan tampil di tab Actions GitHub
name: Deploy Website to Hostinger

# Pemicu: Kapan workflow ini harus dijalankan?
on:
  push:
    branches:
      - main  # Jalankan hanya jika ada push ke branch 'main'

# Pekerjaan yang harus dilakukan
jobs:
  ftp-deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest # Menggunakan server virtual Linux dari GitHub
    steps:
      # Langkah 1: Mengambil (checkout) kode dari repository Anda
      - name: Get latest code
        uses: actions/checkout@v4

      # Langkah 2: Mengirim file ke Hostinger menggunakan FTP
      - name: FTP Deploy Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Mengambil kredensial dari brankas "Secrets" yang sudah kita buat
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # Hostinger mewajibkan protokol aman (FTPS)
          protocol: ftps
          # Memastikan GitHub menggunakan port FTP yang tepat agar tidak timeout
          port: 21
          
          # Folder tujuan di Hostinger.
          server-dir: ./
          
          # Cegah robot GitHub menghapus file rahasia & data admin di server!
          exclude: |
            **/.git*
            **/.git*/**
            config.php
            assets/images/**
            assets/settings.json
