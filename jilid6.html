    .kotak-besar {

    .grid-kotak {

    .grid-item {

  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    // --- CEK SESI 1 PERANGKAT ---
    async function cekSesi() {
      const usr = localStorage.getItem('username');
      const tkn = localStorage.getItem('session_token');
      if (!usr || !tkn) return;
      try {
        const res = await fetch('check_session.php', { method: 'POST', body: JSON.stringify({username: usr, session_token: tkn}) });
        const json = await res.json();
        if (json.status === 'invalid') {
          alert(json.message); localStorage.clear(); window.location.replace('index.html');
        }
      } catch(e) {
        console.error("Kesalahan jaringan saat cek sesi:", e);
      }
    }
    cekSesi(); setInterval(cekSesi, 15000);

    const hamburgerBtn = document.getElementById('hamburger-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    hamburgerBtn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
    });

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
    }

    const TARGET_JUMLAH_KOTAK = 1; // Diatur menjadi 1 kotak (1 kolom x 1 baris)

    // URL Web App dari Google Apps Script Anda akan diletakkan di sini
    const gasApiUrl = 'https://script.google.com/macros/s/AKfycbzkaPd1wxezWDzT7SLW4vdudTCA4uxnMFkmZam7HOWGZYC_c0hq_f0xQ9-xdvN5jEU7/exec';

    let dataPelajaran = [];
    let indexSaatIni = 0;
    let dataBabGlobal = [];
    let modeImtihan = false;
    let skorBenar = 0;
    let skorSalah = 0;

    async function muatDataPelajaran() {
      document.getElementById('judul-h3').textContent = 'Memuat Data Pelajaran...';
      try {
        // Memuat 16 Bab Artikel Panjang (1 Halaman Penuh)
        const dataBab = generateDataArtikelPanjang();
        dataBabGlobal = dataBab;
        
        prosesDataBab(dataBabGlobal);
        renderHalaman();

      } catch (error) {
        console.error('Gagal memuat data pelajaran:', error);
        document.getElementById('judul-h3').textContent = 'Gagal Memuat Data';
        document.getElementById('kotak-besar').textContent = 'Pastikan URL Google Apps Script benar dan sudah di-deploy dengan akses "Anyone". Coba refresh halaman.';
      }
    }

    function generateDataArtikelPanjang() {
      const artikel = [
        { kata: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ. الْحَمْدُ لِلَّهِ تَبَرُّكًا بِفَاتِحَةِ الْكِتَابِ، لِأَنَّهَا مَبْدَأُ كُلِّ أَمْرٍ ذِي بَالٍ، وَخَاتِمَةُ كُلِّ دُعَاءٍ مُجَابٍ، وَآيَةُ كُلِّ سُورَةٍ. قَالَ الْقَاضِي أَبُو شُجَاعٍ أَحْمَدُ بْنُ الْحُسَيْنِ بْنِ أَحْمَدَ الْأَصْفَهَانِيُّ رَحِمَهُ اللَّهُ تَعَالَى: سَأَلَنِي بَعْضُ الْأَصْدِقَاءِ حَفِظَهُمُ اللَّهُ تَعَالَى أَنْ أَعْمَلَ مُخْتَصَرًا فِي الْفِقْهِ عَلَى مَذْهَبِ الْإِمَامِ الشَّافِعِيِّ رَحْمَةُ اللَّهِ تَعَالَى عَلَيْهِ وَرِضْوَانُهُ، فِي غَايَةِ الِاخْتِصَارِ وَنِهَايَةِ الْإِيجَازِ، لِيَقْرُبَ عَلَى الْمُتَعَلِّمِ دَرْسُهُ، وَيَسْهُلَ عَلَى الْمُبْتَدِئِ حِفْظُهُ.", arti: "Dengan nama Allah Yang Maha Pengasih lagi Maha Penyayang. Segala puji bagi Allah sebagai tabarruk dengan Fatihah Al-Kitab... Al-Qadhi Abu Syuja' berkata: Sebagian teman memintaku membuat ringkasan fiqih mazhab Syafi'i yang sangat ringkas agar mudah dipelajari dan dihafal." },
        { kata: "فَصْلٌ: شُرُوطُ الصَّلَاةِ ثَمَانِيَةٌ: طَهَارَةُ الْحَدَثَيْنِ، وَطَهَارَةُ النَّجَسِ فِي الثَّوْبِ وَالْبَدَنِ وَالْمَكَانِ، وَسَتْرُ الْعَوْرَةِ، وَاسْتِقْبَالُ الْقِبْلَةِ، وَدُخُولُ الْوَقْتِ، وَالْعِلْمُ بِفَرْضِيَّتِهَا، وَأَنْ لَا يَعْتَقِدَ فَرْضًا مِنْ فُرُوضِهَا سُنَّةً، وَاجْتِنَابُ الْمُبْطِلَاتِ. الْأَحْدَاثُ اثْنَانِ: أَصْغَرُ وَأَكْبَرُ، فَالْأَصْغَرُ مَا أَوْجَبَ الْوُضُوءَ، وَالْأَكْبَرُ مَا أَوْجَبَ الْغُسْلَ. الْعَوْرَاتُ أَرْبَعٌ: عَوْرَةُ الرَّجُلِ مُطْلَقًا وَالْأَمَةِ فِي الصَّلَاةِ مَا بَيْنَ السُّرَّةِ وَالرُّكْبَةِ، وَعَوْرَةُ الْحُرَّةِ فِي الصَّلَاةِ جَمِيعُ بَدَنِهَا إِلَّا الْوَجْهَ وَالْكَفَّيْنِ.", arti: "Syarat shalat ada 8: suci dari hadats, suci dari najis, menutup aurat, menghadap kiblat, masuk waktu... Hadats ada 2: kecil dan besar... Aurat laki-laki antara pusar dan lutut, wanita merdeka seluruh tubuh kecuali wajah dan telapak tangan." },
        { kata: "الْكَلَامُ هُوَ اللَّفْظُ الْمُرَكَّبُ الْمُفِيدُ بِالْوَضْعِ. وَأَقْسَامُهُ ثَلَاثَةٌ: اسْمٌ، وَفِعْلٌ، وَحَرْفٌ جَاءَ لِمَعْنًى. فَالِاسْمُ يُعْرَفُ بِالْخَفْضِ، وَالتَّنْوِينِ، وَدُخُولِ الْأَلِفِ وَاللَّامِ، وَحُرُوفِ الْخَفْضِ وَهِيَ: مِنْ، وَإِلَى، وَعَنْ، وَعَلَى، وَفِي، وَرُبَّ، وَالْبَاءُ، وَالْكَافُ، وَاللَّامُ، وَحُرُوفِ الْقَسَمِ وَهِيَ الْوَاوُ وَالْبَاءُ وَالتَّاءُ. وَالْفِعْلُ يُعْرَفُ بِقَدْ، وَالسِّينِ، وَسَوْفَ، وَتَاءِ التَّأْنِيثِ السَّاكِنَةِ. وَالْحَرْفُ مَا لَا يَصْلُحُ مَعَهُ دَلِيلُ الِاسْمِ وَلَا دَلِيلُ الْفِعْلِ.", arti: "Kalam adalah lafaz yang tersusun, berfaedah, dan disengaja. Pembagiannya ada tiga: Isim, Fi'il, dan Huruf. Isim dikenali dengan khafadh, tanwin, kemasukan alif-lam, dan huruf jar... Fi'il dikenali dengan qod, sin, saufa, dan ta' ta'nits." },
        { kata: "بَابُ الْإِعْرَابِ. الْإِعْرَابُ هُوَ تَغْيِيرُ أَوَاخِرِ الْكَلِمِ لِاخْتِلَافِ الْعَوَامِلِ الدَّاخِلَةِ عَلَيْهَا لَفْظًا أَوْ تَقْدِيرًا. وَأَقْسَامُهُ أَرْبَعَةٌ: رَفْعٌ، وَنَصْبٌ، وَخَفْضٌ، وَجَزْمٌ. فَلِلْأَسْمَاءِ مِنْ ذَلِكَ الرَّفْعُ وَالنَصْبُ وَالْخَفْضُ وَلَا جَزْمَ فِيهَا، وَلِلْأَفْعَالِ مِنْ ذَلِكَ الرَّفْعُ وَالنَصْبُ وَالْجَزْمُ وَلَا خَفْضَ فِيهَا. بَابُ مَعْرِفَةِ عَلَامَاتِ الْإِعْرَابِ. لِلرَّفْعِ أَرْبَعُ عَلَامَاتٍ: الضَّمَّةُ، وَالْوَاوُ، وَالْأَلِفُ، وَالنُّونُ. فَأَمَّا الضَّمَّةُ فَتَكُونُ عَلَامَةً لِلرَّفْعِ فِي أَرْبَعَةِ مَوَاضِعَ.", arti: "Bab I'rab. I'rab adalah perubahan akhir kalimat karena perbedaan amil yang memasukinya... Pembagiannya ada empat: Rafa', Nashab, Khafadh, dan Jazm. Isim bisa rafa, nashab, khafadh (tanpa jazm). Fi'il bisa rafa, nashab, jazm (tanpa khafadh)." },
        { kata: "فَصْلٌ فِي النِّيَّةِ فِي حَالِ التَّعَلُّمِ. ثُمَّ لَا بُدَّ لَهُ مِنَ النِّيَّةِ فِي زَمَانِ تَعَلُّمِ الْعِلْمِ، إِذِ النِّيَّةُ هِيَ الْأَصْلُ فِي جَمِيعِ الْأَحْوَالِ، لِقَوْلِهِ عَلَيْهِ السَّلَامُ: إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ. يَنْبَغِي أَنْ يَنْوِيَ الْمُتَعَلِّمُ بِطَلَبِ الْعِلْمِ رِضَا اللَّهِ تَعَالَى وَالدَّارَ الْآخِرَةَ، وَإِزَالَةَ الْجَهْلِ عَنْ نَفْسِهِ وَعَنْ سَائِرِ الْجُهَّالِ، وَإِحْيَاءَ الدِّينِ، وَإِبْقَاءَ الْإِسْلَامِ، فَإِنَّ بَقَاءَ الْإِسْلَامِ بِالْعِلْمِ، وَلَا يَصِحُّ الزُّهْدُ وَالتَّقْوَى مَعَ الْجَهْلِ.", arti: "Pasal tentang niat saat belajar. Pelajar wajib berniat saat menuntut ilmu, karena niat adalah pokok segala amal... Hendaknya berniat mencari ridha Allah, akhirat, menghilangkan kebodohan dari diri dan orang lain, menghidupkan agama, dan melestarikan Islam." },
        { kata: "وَأَمَّا اخْتِيَارُ الْأُسْتَاذِ، فَيَنْبَغِي أَنْ يَخْتَارَ الْأَعْلَمَ وَالْأَوْرَعَ وَالْأَسَنَّ، كَمَا اخْتَارَ أَبُو حَنِيفَةَ رَحِمَهُ اللَّهُ حَمَّادَ بْنَ أَبِي سُلَيْمَانَ بَعْدَ التَّأَمُّلِ وَالتَّفَكُّرِ. وَقَالَ: وَجَدْتُهُ شَيْخًا وَقُورًا حَلِيمًا صَبُورًا فِي الْأُمُورِ. وَقَالَ أَبُو حَنِيفَةَ: ثَبَتُّ عِنْدَ حَمَّادِ بْنِ أَبِي سُلَيْمَانَ فَنَبَتُّ. وَيَنْبَغِي أَنْ يُشَاوِرَ فِي أَمْرِ التَّعَلُّمِ، فَإِنَّ اللَّهَ تَعَالَى أَمَرَ رَسُولَهُ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ بِالْمُشَاوَرَةِ فِي الْأُمُورِ.", arti: "Adapun memilih guru, hendaknya memilih yang paling alim, wara', dan sepuh, sebagaimana Abu Hanifah memilih Hammad bin Abi Sulaiman setelah merenung... Dan hendaknya bermusyawarah dalam urusan belajar." },
        { kata: "يَنْهَضُ الْإِنْسَانُ بِمَا عِنْدَهُ مِنْ فِكْرٍ عَنِ الْحَيَاةِ وَالْكَوْنِ وَالْإِنْسَانِ، وَعَنْ عَلَاقَتِهَا جَمِيعًا بِمَا قَبْلَ الْحَيَاةِ الدُّنْيَا وَمَا بَعْدَهَا. لِذَلِكَ كَانَ لَا بُدَّ مِنْ تَغْيِيرِ فِكْرِ الْإِنْسَانِ تَغْيِيرًا أَسَاسِيًّا شَامِلًا حَتَّى يَنْهَضَ، لِأَنَّ الْفِكْرَ هُوَ الَّذِي يُوجِدُ الْمَفَاهِيمَ عَنِ الْأَشْيَاءِ، وَيُرَكِّزُ هَذِهِ الْمَفَاهِيمَ. وَالْإِنْسَانُ يُكَيِّفُ سُلُوكَهُ فِي الْحَيَاةِ بِحَسَبِ مَفَاهِيمِهِ عَنْهَا، فَالسُّلُوكُ الْإِنْسَانِيُّ مُرْتَبِطٌ بِمَفَاهِيمِ الْإِنْسَانِ ارْتِبَاطًا مُحْكَمًا.", arti: "Manusia bangkit dengan pemikirannya tentang kehidupan, alam semesta, dan manusia, serta hubungannya dengan sebelum dan sesudah dunia. Oleh karena itu, mutlak diperlukan perubahan pemikiran secara mendasar dan menyeluruh agar ia bangkit..." },
        { kata: "وَالطَّرِيقُ لِنَهْضَةِ الْإِنْسَانِ هُوَ أَنْ يَحْصُلَ لَدَيْهِ تَغَيُّرٌ شَامِلٌ لِمَفَاهِيمِهِ السَّابِقَةِ، وَأَنْ تُوجَدَ لَدَيْهِ مَفَاهِيمُ جَدِيدَةٌ تُوجِدُ عِنْدَهُ هَذَا الْفِكْرَ. وَلِكَيْ تُوجَدَ هَذِهِ الْمَفَاهِيمُ وَتَتَغَيَّرَ الْمَفَاهِيمُ السَّابِقَةُ، لَا بُدَّ أَنْ تُوجَدَ الْفِكْرَةُ الْكُلِّيَّةُ عَنِ الْحَيَاةِ وَالْكَوْنِ وَالْإِنْسَانِ، لِأَنَّهَا هِيَ الْقَاعِدَةُ الْفِكْرِيَّةُ الَّتِي تُبْنَى عَلَيْهَا جَمِيعُ الْأَفْكَارِ، وَتَنْبَثِقُ عَنْهَا جَمِيعُ الْمَفَاهِيمِ.", arti: "Jalan kebangkitan manusia adalah dengan mengubah konsep lamanya... Harus ada pemikiran menyeluruh tentang kehidupan, alam, dan manusia, yang menjadi kaidah berpikir dan melahirkan seluruh konsep lainnya." }
      ];
      let babs = [];
      for(let i=0; i<16; i++) {
        babs.push({ 
          judul: "Kitab Gundul " + (i % 2 === 0 ? "Salaf" : "Khalaf") + " (Halaman " + (i+1) + ")", 
          penjelasan: "Membaca teks kitab kuning tanpa harokat satu halaman penuh untuk melatih insting I'rob dan pernafasan.", 
          kosakata: [artikel[i % artikel.length]] 
        });
      }
      return babs;
    }

    function prosesDataBab(dataBab) {
      dataPelajaran = [];
      let nomorHalaman = 1;
      
      dataBab.forEach(bab => {
        dataPelajaran.push({
          halaman: nomorHalaman++,
          judul: bab.judul + (modeImtihan ? " (Evaluasi Suara AI)" : " (Latihan Baca)"),
          penjelasan: modeImtihan 
            ? "UJIAN AI: Baca seluruh teks gundul ini. AI akan mendengarkan dan menilai ketepatan Anda!" 
            : "LATIHAN 100% GUNDUL. Klik teks untuk mendengarkan contoh bacaan (harokat/i'rob) yang benar dari ustadz AI.",
          fase: modeImtihan ? 3 : 1, // Fase 3 = Ujian AI, Fase 1 = Klik memutar suara
          kosakata: bab.kosakata.map(k => ({
            kata: k.kata.replace(/[\u064B-\u065F\u0670]/g, ''), // SELALU GUNDUL 100%
            arti: k.arti,
            kataAsli: k.kata
          }))
        });
      });
    }

    function acakUrutan(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateSkor() {
      let predikat = "Aadi";
      if (skorBenar === TARGET_JUMLAH_KOTAK) predikat = "Mumtaz 🌟";
      else if (skorBenar >= Math.ceil(TARGET_JUMLAH_KOTAK * 0.7)) predikat = "Jayyid 👍";
      else if (skorBenar >= Math.ceil(TARGET_JUMLAH_KOTAK * 0.4)) predikat = "Aslaha 🙂";
      
      document.getElementById('skor-papan').innerHTML = `Skor Benar: <span style="color:#10B981">${skorBenar}</span>/${TARGET_JUMLAH_KOTAK} | Predikat: <span style="color:#2563EB">${predikat}</span>`;
    }

    function cekBacaanAI(kataTargetAsli, gridItem, spanKata) {
      if (gridItem.classList.contains('terjawab')) {
        alert("Kotak ini sudah dinilai! Silakan lanjut ke kotak lain untuk mengumpulkan skor.");
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Browser Anda tidak mendukung AI Suara. Mohon gunakan Google Chrome.");
        return;
      }
      
      const recognition = new SpeechRecognition();
      recognition.lang = 'ar-SA';
      recognition.interimResults = false;
      
      // --- PERUBAHAN UI SESUAI PERMINTAAN ---
      const micIndicator = document.createElement('div');
      micIndicator.innerHTML = '🎙️';
      micIndicator.style.position = 'absolute';
      micIndicator.style.top = '5px';
      micIndicator.style.right = '5px';
      micIndicator.style.fontSize = '1rem';
      micIndicator.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
      micIndicator.style.color = 'white';
      micIndicator.style.width = '24px';
      micIndicator.style.height = '24px';
      micIndicator.style.borderRadius = '50%';
      micIndicator.style.display = 'flex';
      micIndicator.style.alignItems = 'center';
      micIndicator.style.justifyContent = 'center';
      micIndicator.style.zIndex = '11';

      gridItem.style.backgroundColor = "#f39c12"; // Warna kuning
      spanKata.style.color = "#000000"; // Tulisan hitam
      gridItem.style.transform = "scale(0.95)";
      gridItem.appendChild(micIndicator);

      const cleanupUI = () => {
        if (gridItem.contains(micIndicator)) {
            gridItem.removeChild(micIndicator);
        }
        gridItem.style.backgroundColor = ""; // Hapus warna kuning
        spanKata.style.color = ""; // Kembalikan warna tulisan
        gridItem.style.transform = ""; // Hapus efek tekan
      };

      recognition.onresult = (event) => {
        cleanupUI();

        const hasil = event.results[0][0].transcript;
        const hasilGundul = hasil.replace(/[\u064B-\u065F\u0670]/g, '').trim();
        const targetGundul = kataTargetAsli.replace(/[\u064B-\u065F\u0670]/g, '').trim();
        
        if (hasilGundul === targetGundul) {
          gridItem.classList.add('benar', 'terjawab'); // Jadi hijau
          skorBenar++;
          alert(`✅ BACAAN BENAR!\n\nBacaan Anda: ${hasil}`);
        } else {
          gridItem.classList.add('salah', 'terjawab'); // Jadi merah
          skorSalah++;
          alert(`🤖 KURANG TEPAT.\n\nAnda membaca: ${hasil}\nSeharusnya: ${kataTargetAsli}`);
          
          gridItem.onclick = () => {
            spanKata.textContent = kataTargetAsli;
            bacaTeksArab(kataTargetAsli);
          };
        }
        updateSkor();
      };

      recognition.onerror = (event) => {
        cleanupUI();
        alert("Gagal mendengarkan suara: " + event.error);
      };

      recognition.onend = () => {
        cleanupUI();
      };

      recognition.start();
    }

    function bacaTeksArab(teks) {
      const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(teks)}`;
      const audio = new Audio(urlAudio);
      
      audio.play().catch(e => {
        console.error("Gagal memutar audio API Google:", e);
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(teks);
          utterance.lang = 'ar-SA';
          utterance.rate = 0.8;
          window.speechSynthesis.speak(utterance);
        }
      });
    }

    function renderHalaman() {
      if (dataPelajaran.length === 0) return;

      const data = dataPelajaran[indexSaatIni];
      
      skorBenar = 0;
      skorSalah = 0;
      if (data.fase === 3) {
        document.getElementById('skor-papan').style.display = 'block';
        updateSkor();
      } else {
        document.getElementById('skor-papan').style.display = 'none';
      }

      document.getElementById('judul-h3').textContent = data.judul;
      document.getElementById('kotak-besar').textContent = data.penjelasan;
      document.getElementById('halaman-teks').textContent = 'Halaman ' + data.halaman;
      document.getElementById('search').value = data.halaman;

      const grid = document.getElementById('grid-kotak');
      grid.innerHTML = ''; 
      
      let kosakataUntukGrid = [];
      if (data.kosakata.length > 0) {
        for (let i = 0; i < TARGET_JUMLAH_KOTAK; i++) {
          kosakataUntukGrid.push(data.kosakata[i % data.kosakata.length]);
        }
      } else {
        for (let i = 0; i < TARGET_JUMLAH_KOTAK; i++) {
          kosakataUntukGrid.push({ kata: '&nbsp;', arti: '' });
        }
      }

      const kotakArray = acakUrutan(kosakataUntukGrid);
      
      kotakArray.forEach(item => {
        const div = document.createElement('div');
        div.className = 'grid-item';

        const spanKata = document.createElement('span');
        spanKata.textContent = item.kata;
        div.appendChild(spanKata);

        if (data.fase === 1 || data.fase === 2) {
          div.onclick = () => {
            div.style.transform = "scale(0.95)";
            setTimeout(() => div.style.transform = "", 150);
            bacaTeksArab(item.kataAsli || item.kata);
          };
        }

        const popup = document.createElement('div');
        popup.className = 'popup';
        
        if (data.fase === 2) {
          popup.innerHTML = `<div>${item.arti}</div><div style="margin-top: 5px; font-size: 1.4rem; font-weight: bold; color: #2563EB;">${item.kataAsli}</div>`;
        } else {
          popup.innerHTML = `<div>${item.arti}</div>`;
        }
        
        if (data.fase === 3) {
          div.onclick = () => {
            cekBacaanAI(item.kataAsli, div, spanKata);
          };
        }
        
        div.appendChild(popup);
        grid.appendChild(div);
      });
    }

    document.getElementById('btnMaju').onclick = () => {
      if (indexSaatIni < dataPelajaran.length - 1) { indexSaatIni++; renderHalaman(); }
    };
    document.getElementById('btnMundur').onclick = () => {
      if (indexSaatIni > 0) { indexSaatIni--; renderHalaman(); }
    };
    document.getElementById('btnRefresh').onclick = () => muatDataPelajaran();

    document.getElementById('btnCari').onclick = () => {
      const inputVal = parseInt(document.getElementById('search').value);
      if (!isNaN(inputVal) && inputVal > 0 && inputVal <= dataPelajaran.length) {
        indexSaatIni = inputVal - 1;
        renderHalaman();
      } else {
        alert(`Halaman tidak valid! Masukkan angka antara 1 sampai ${dataPelajaran.length}.`);
      }
    };

    document.getElementById('btnImtihan').onclick = () => {
      modeImtihan = !modeImtihan;
      const btn = document.getElementById('btnImtihan');
      if (modeImtihan) {
        btn.innerHTML = "🎓 Mode Imtihan: ON";
        btn.classList.add('active');
        indexSaatIni = 0;
      } else {
        btn.innerHTML = "🎓 Mode Imtihan: OFF";
        btn.classList.remove('active');
        indexSaatIni = 0;
      }
      if (dataBabGlobal.length > 0) {
        prosesDataBab(dataBabGlobal);
        renderHalaman();
      }
    };

    muatDataPelajaran();
  });
  </script>
  <script src="security.js"></script>
</body>
